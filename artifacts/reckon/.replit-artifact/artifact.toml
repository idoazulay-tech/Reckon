kind = "web"
previewPath = "/"
title = "Reckon"
version = "1.0.0"
id = "artifacts/reckon"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 18787

[services.development]
run = "pnpm --filter @workspace/reckon run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/reckon", "run", "build" ]
publicDir = "artifacts/reckon/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "18787"
BASE_PATH = "/"
